version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: counselor_portal_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-RootPass#2026}
      MYSQL_DATABASE: ${DB_NAME:-counselor_portal}
      MYSQL_USER: ${DB_USER:-db_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-Str0ng!Pass#2026}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - counselor_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: counselor_portal_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-5000}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-db_user}
      DB_PASSWORD: ${DB_PASSWORD:-Str0ng!Pass#2026}
      DB_NAME: ${DB_NAME:-counselor_portal}
      JWT_SECRET: ${JWT_SECRET:-b94bedc132ef420bb17256a0bafe1e5d880225a9e8dc4399b57012a070617a42}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
    ports:
      - "${BACKEND_PORT:-5000}:${BACKEND_PORT:-5000}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/filestore:/app/filestore
    networks:
      - counselor_network

  # Frontend UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: counselor_portal_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - counselor_network

volumes:
  db_data:
    driver: local

networks:
  counselor_network:
    driver: bridge
